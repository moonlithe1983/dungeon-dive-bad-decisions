<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" width="360" height="640">

    
<defs>
  <linearGradient id="bgDark" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#120206"/>
    <stop offset="100%" stop-color="#080103"/>
  </linearGradient>
  <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="12"/>
  </filter>
  <filter id="medBlur" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="22"/>
  </filter>
  <filter id="heavyBlur" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="34"/>
  </filter>
  <radialGradient id="emberGlow" cx="50%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#ffbf57" stop-opacity="0.28"/>
    <stop offset="50%" stop-color="#ff9d1a" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#ff9d1a" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="tealGlow" cx="50%" cy="20%" r="80%">
    <stop offset="0%" stop-color="#75ebff" stop-opacity="0.20"/>
    <stop offset="45%" stop-color="#46c7d9" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#46c7d9" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glassGlow" cx="50%" cy="20%" r="90%">
    <stop offset="0%" stop-color="#e8f2fb" stop-opacity="0.18"/>
    <stop offset="50%" stop-color="#b8bec8" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#b8bec8" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#000000" stop-opacity="0.42"/>
    <stop offset="22%" stop-color="#000000" stop-opacity="0.08"/>
    <stop offset="78%" stop-color="#000000" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.48"/>
  </linearGradient>
</defs>

    <rect width="360" height="640" fill="#000000" opacity="0.28"/>
    <rect x="28" y="120" width="304" height="360" rx="26" fill="#ffffff" opacity="0.02"/>
    <rect x="28" y="120" width="304" height="360" rx="26" fill="none" stroke="#f5efe2" opacity="0.10" stroke-width="2"/>
    <g filter="url(#heavyBlur)" opacity="0.18">
      <rect x="42" y="136" width="276" height="328" rx="20" fill="#f5efe2"/>
    </g>
    <rect width="360" height="640" fill="url(#vignette)"/>
    
</svg>